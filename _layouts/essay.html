---
layout: default
---
<article class="essay-card" lang="{{ page.lang | default: 'he' }}" dir="{{ page.dir | default: 'ltr' }}">
  <header class="essay-head">
    <h1>{{ page.title }}</h1>
    <p class="meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%Y-%m-%d" }}</time>
      {% if page.summary %}
        · {{ page.summary }}
      {% endif %}
    </p>
  </header>
  <section class="essay-content">
    {{ content }}
  </section>
</article>
