---
layout: default
---
<article class="essay-card" lang="{{ page.lang | default: 'he' }}" dir="{{ page.dir | default: 'ltr' }}">
  <header class="essay-head">
    <h1>{{ page.title }}</h1>
    <p class="meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%Y-%m-%d" }}</time>
      {% if page.summary %}
        · {{ page.summary }}
      {% endif %}
    </p>
    {% if page.tags %}
      <ul class="topic-list">
        {% for topic in page.tags %}
          <li><a href="{{ '/topics/#' | append: topic | slugify | relative_url }}">{{ topic }}</a></li>
        {% endfor %}
      </ul>
    {% endif %}
  </header>
  <section class="essay-content">
    {{ content }}
  </section>
</article>
