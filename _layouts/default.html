<!doctype html>
<html lang="{{ page.lang | default: site.lang | default: 'he' }}" dir="{{ page.text_dir | default: 'ltr' }}">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.summary | default: page.excerpt | strip_html | default: site.description }}" />
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
  </head>
  <body>
    {% include header.html %}
    <main class="page-shell">
      {{ content }}
    </main>
    {% include footer.html %}
    <script>
      (function () {
        var languageKey = "valsesiaPreferredLanguage";
        var modeKey = "valsesiaHomeMode";
        var currentLang = document.documentElement.lang || "he";
        var langLinks = document.querySelectorAll("[data-lang-link]");

        langLinks.forEach(function (link) {
          var linkLang = link.getAttribute("data-lang-link");
          if (linkLang === currentLang) {
            link.classList.add("is-active");
          }

          link.addEventListener("click", function () {
            try {
              localStorage.setItem(languageKey, linkLang);
            } catch (err) {
              // No-op if storage is blocked.
            }
          });
        });

        var preferredLanguage = null;
        try {
          preferredLanguage = localStorage.getItem(languageKey);
        } catch (err) {
          preferredLanguage = null;
        }

        if (preferredLanguage) {
          var preferredLink = document.querySelector("[data-preferred-lang-link]");
          if (preferredLink) {
            var baseUrl = preferredLink.getAttribute("data-preferred-lang-link");
            preferredLink.setAttribute("href", baseUrl + preferredLanguage + "/");
            preferredLink.hidden = false;
            preferredLink.textContent = "Go to preferred language";
          }
        }

        var resolvePreferredLanguage = function () {
          if (preferredLanguage) {
            return preferredLanguage;
          }

          var browserLanguage = (navigator.language || "").toLowerCase();
          if (browserLanguage.indexOf("he") === 0) {
            return "he";
          }
          if (browserLanguage.indexOf("it") === 0) {
            return "it";
          }
          if (browserLanguage.indexOf("en") === 0) {
            return "en";
          }

          return currentLang;
        };

        var interfaceText = {
          he: {
            availableIn: "זמין גם ב:",
          },
          it: {
            availableIn: "Disponibile anche in:",
          },
          en: {
            availableIn: "Also available in:",
          },
        };

        var languageLabels = {
          he: "עברית",
          it: "Italiano",
          en: "English",
        };

        var getInterfaceText = function (key, lang) {
          var languageText = interfaceText[lang] || interfaceText.en;
          return languageText[key] || interfaceText.en[key] || "";
        };

        var getLanguageLabel = function (lang) {
          return languageLabels[lang] || String(lang || "").toUpperCase();
        };

        var storePreferredLanguage = function (lang) {
          try {
            localStorage.setItem(languageKey, lang);
          } catch (err) {
            // No-op if storage is blocked.
          }
        };

        var fullCorpusTranslationScanLimit = 20;

        var collectGlobalTranslationGroups = function () {
          var sourceList = document.querySelector("[data-all-translation-source]");
          var groups = new Map();

          if (!sourceList) {
            return groups;
          }

          var sourceItems = sourceList.querySelectorAll("li[data-translation-group]");
          Array.prototype.slice.call(sourceItems, 0, fullCorpusTranslationScanLimit).forEach(function (item) {
            var groupKey = item.getAttribute("data-translation-group");
            var entryLang = item.getAttribute("data-entry-lang") || "";
            var titleLink = item.querySelector("a");
            if (!groupKey || !titleLink) {
              return;
            }

            if (!groups.has(groupKey)) {
              groups.set(groupKey, []);
            }

            var groupEntries = groups.get(groupKey);
            var href = titleLink.getAttribute("href") || "";
            var alreadyAdded = groupEntries.some(function (entry) {
              return entry.lang === entryLang && entry.href === href;
            });

            if (!alreadyAdded) {
              groupEntries.push({
                lang: entryLang,
                href: href,
              });
            }
          });

          return groups;
        };

        var buildTranslationLinks = function (bestItem, linkEntries) {
          var existing = bestItem.querySelector("[data-generated-translation-links]");
          if (existing) {
            existing.remove();
          }

          var staticTag = bestItem.querySelector(".tag");
          if (staticTag) {
            staticTag.hidden = true;
          }

          var wrapper = document.createElement("div");
          wrapper.className = "translation-inline";
          wrapper.setAttribute("data-generated-translation-links", "true");

          var label = document.createElement("span");
          label.className = "translation-inline-label";
          label.textContent = getInterfaceText(
            "availableIn",
            bestItem.getAttribute("data-entry-lang") || currentLang
          );
          wrapper.appendChild(label);

          var links = document.createElement("div");
          links.className = "translation-link-row";

          var bestLink = bestItem.querySelector("a");
          var bestHref = bestLink ? bestLink.getAttribute("href") || "" : "";
          var bestLang = bestItem.getAttribute("data-entry-lang") || "";

          linkEntries.forEach(function (entry) {
            if (!entry.href) {
              return;
            }

            if (entry.href === bestHref && entry.lang === bestLang) {
              return;
            }

            var otherLink = document.createElement("a");
            otherLink.className = "translation-pill";
            otherLink.href = entry.href;
            otherLink.textContent = getLanguageLabel(entry.lang);
            otherLink.addEventListener("click", function () {
              storePreferredLanguage(entry.lang);
            });
            links.appendChild(otherLink);
          });

          wrapper.appendChild(links);

          var metaNode = bestItem.querySelector(".meta");
          if (metaNode) {
            metaNode.insertAdjacentElement("afterend", wrapper);
          } else {
            bestItem.appendChild(wrapper);
          }
        };

        var deduplicateTranslationLists = function () {
          var preferredEntryLanguage = resolvePreferredLanguage();
          var globalGroups = collectGlobalTranslationGroups();
          var lists = document.querySelectorAll("[data-deduplicate-translations]");

          lists.forEach(function (list) {
            var groups = new Map();
            var items = list.querySelectorAll("li[data-translation-group]");

            items.forEach(function (item) {
              var groupKey = item.getAttribute("data-translation-group");
              if (!groupKey) {
                return;
              }

              if (!groups.has(groupKey)) {
                groups.set(groupKey, []);
              }

              groups.get(groupKey).push(item);
            });

              groups.forEach(function (groupItems, groupKey) {
              var bestItem = null;

              groupItems.forEach(function (item) {
                if (item.getAttribute("data-entry-lang") === preferredEntryLanguage && !bestItem) {
                  bestItem = item;
                }
              });

              if (!bestItem) {
                groupItems.forEach(function (item) {
                  if (item.getAttribute("data-entry-lang") === currentLang && !bestItem) {
                    bestItem = item;
                  }
                });
              }

              if (!bestItem) {
                bestItem = groupItems[0];
              }

              var linkEntries = globalGroups.get(groupKey) || [];

              if (groupItems.length > 1) {
                groupItems.forEach(function (item) {
                  item.hidden = item !== bestItem;
                });
              }

              if (linkEntries.length > 1) {
                buildTranslationLinks(bestItem, linkEntries);
              }
            });
          });
        };

        deduplicateTranslationLists();

        var modeButtons = document.querySelectorAll("[data-mode-button]");
        var modeTarget = document.querySelector("[data-home-mode-target]");

        if (modeButtons.length > 0 && modeTarget) {
          var defaultMode = modeTarget.getAttribute("data-home-mode-default") || "abstracts";
          var activeMode = defaultMode;

          try {
            activeMode = localStorage.getItem(modeKey) || defaultMode;
          } catch (err) {
            activeMode = defaultMode;
          }

          var setMode = function (mode) {
            modeTarget.setAttribute("data-home-mode-target", mode);
            modeButtons.forEach(function (btn) {
              var isActive = btn.getAttribute("data-mode-button") === mode;
              btn.classList.toggle("is-active", isActive);
              btn.setAttribute("aria-pressed", isActive ? "true" : "false");
            });

            try {
              localStorage.setItem(modeKey, mode);
            } catch (err) {
              // No-op if storage is blocked.
            }
          };

          setMode(activeMode);

          modeButtons.forEach(function (btn) {
            btn.addEventListener("click", function () {
              setMode(btn.getAttribute("data-mode-button"));
            });
          });
        }

        var audioPlayers = document.querySelectorAll("[data-audio-player]");
        audioPlayers.forEach(function (player) {
          var audioElement = player.querySelector("[data-audio-element]");
          var toggleButton = player.querySelector("[data-audio-toggle]");
          var initialTimeLabel = player.querySelector("[data-audio-initial]");
          var advancedControls = player.querySelector("[data-audio-advanced]");
          var seekSlider = player.querySelector("[data-audio-seek]");
          var currentTimeLabel = player.querySelector("[data-audio-current]");
          var totalTimeLabel = player.querySelector("[data-audio-total]");

          if (!audioElement || !toggleButton || !initialTimeLabel || !advancedControls || !seekSlider || !currentTimeLabel || !totalTimeLabel) {
            return;
          }

          var formatTime = function (valueInSeconds) {
            if (!Number.isFinite(valueInSeconds) || valueInSeconds < 0) {
              return "00:00";
            }

            var totalSeconds = Math.floor(valueInSeconds);
            var minutes = Math.floor(totalSeconds / 60);
            var seconds = totalSeconds % 60;
            var paddedSeconds = String(seconds).padStart(2, "0");
            return String(minutes) + ":" + paddedSeconds;
          };

          var playText = toggleButton.getAttribute("data-audio-play-text") || "Play";
          var stopText = toggleButton.getAttribute("data-audio-stop-text") || "Stop";

          var setToggleLabel = function (isPlaying) {
            toggleButton.textContent = isPlaying ? stopText : playText;
          };

          var renderInitialTimeLabel = function (valueInSeconds) {
            initialTimeLabel.textContent = "Listen · " + formatTime(valueInSeconds) + " min";
          };

          var hasStarted = false;
          var isSyncingSlider = false;
          var suppressPauseUntil = 0;
          var activateAdvancedControls = function () {
            if (hasStarted) {
              return;
            }

            hasStarted = true;
            player.classList.add("is-started");
          };

          var setSliderProgress = function () {
            var maxValue = Number(seekSlider.max) || 0;
            var currentValue = Number(seekSlider.value) || 0;
            var progress = maxValue > 0 ? (currentValue / maxValue) * 100 : 0;
            seekSlider.style.setProperty("--seek-progress", String(progress) + "%");
          };

          var setBufferedProgress = function () {
            var duration = audioElement.duration;
            var bufferedPercent = 0;

            if (Number.isFinite(duration) && duration > 0 && audioElement.buffered.length > 0) {
              var lastRangeIndex = audioElement.buffered.length - 1;
              var bufferedEnd = audioElement.buffered.end(lastRangeIndex);
              bufferedPercent = Math.min((bufferedEnd / duration) * 100, 100);
            }

            var playedPercent = Number(seekSlider.style.getPropertyValue("--seek-progress").replace("%", "")) || 0;
            var clampedBuffered = Math.max(bufferedPercent, playedPercent);
            seekSlider.style.setProperty("--buffered-progress", String(clampedBuffered) + "%");
          };

          var setLoadingState = function (isLoading) {
            player.classList.toggle("is-loading", isLoading);
          };

          var syncSeekUI = function (timeInSeconds) {
            isSyncingSlider = true;
            if (Number.isFinite(timeInSeconds) && timeInSeconds >= 0) {
              seekSlider.value = String(timeInSeconds);
              currentTimeLabel.textContent = formatTime(timeInSeconds);
            } else {
              seekSlider.value = "0";
              currentTimeLabel.textContent = "00:00";
            }
            isSyncingSlider = false;
            setSliderProgress();
            setBufferedProgress();
          };

          var syncDurationUI = function () {
            if (Number.isFinite(audioElement.duration) && audioElement.duration > 0) {
              seekSlider.max = String(audioElement.duration);
              totalTimeLabel.textContent = formatTime(audioElement.duration);
              renderInitialTimeLabel(audioElement.duration);
            } else {
              seekSlider.max = "100";
              totalTimeLabel.textContent = "00:00";
              renderInitialTimeLabel(0);
            }
            setSliderProgress();
            setBufferedProgress();
          };

          setToggleLabel(false);
          setLoadingState(false);
          syncSeekUI(0);
          syncDurationUI();

          toggleButton.addEventListener("click", function () {
            var now = Date.now();
            if (audioElement.paused) {
              activateAdvancedControls();
              suppressPauseUntil = now + 400;
              var playPromise = audioElement.play();
              if (playPromise && typeof playPromise.catch === "function") {
                playPromise.catch(function () {
                  suppressPauseUntil = 0;
                  setToggleLabel(false);
                });
              }
            } else {
              if (now < suppressPauseUntil) {
                return;
              }
              audioElement.pause();
              setToggleLabel(false);
            }
          });

          seekSlider.addEventListener("input", function () {
            if (isSyncingSlider) {
              return;
            }

            var nextTime = Number(seekSlider.value);
            if (Number.isFinite(nextTime)) {
              audioElement.currentTime = nextTime;
              syncSeekUI(nextTime);
            }
          });

          audioElement.addEventListener("loadedmetadata", function () {
            syncDurationUI();
            syncSeekUI(audioElement.currentTime);
          });

          audioElement.addEventListener("progress", function () {
            setBufferedProgress();
          });

          audioElement.addEventListener("waiting", function () {
            setLoadingState(true);
          });

          audioElement.addEventListener("stalled", function () {
            setLoadingState(true);
          });

          audioElement.addEventListener("canplay", function () {
            setLoadingState(false);
          });

          audioElement.addEventListener("playing", function () {
            setLoadingState(false);
          });

          audioElement.addEventListener("play", function () {
            setToggleLabel(true);
            syncSeekUI(audioElement.currentTime);
          });

          audioElement.addEventListener("timeupdate", function () {
            syncSeekUI(audioElement.currentTime);
          });

          audioElement.addEventListener("pause", function () {
            if (!audioElement.ended) {
              setToggleLabel(false);
            }
            syncSeekUI(audioElement.currentTime);
          });

          audioElement.addEventListener("ended", function () {
            setToggleLabel(false);
            setLoadingState(false);
            syncSeekUI(audioElement.currentTime);
          });
        });
      })();
    </script>
  </body>
</html>
