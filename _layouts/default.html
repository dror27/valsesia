<!doctype html>
<html lang="{{ page.lang | default: site.lang | default: 'he' }}" dir="{{ page.dir | default: 'ltr' }}">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.summary | default: page.excerpt | strip_html | default: site.description }}" />
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
  </head>
  <body>
    {% include header.html %}
    <main class="page-shell">
      {{ content }}
    </main>
    {% include footer.html %}
  </body>
</html>
